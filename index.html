<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>万象·云归藏留痕 | 跨设备同步版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 样式与之前完全一致，此处省略以节省篇幅，实际使用时请保留完整样式 */
        /* 您可以直接复制之前最终版的所有 CSS 样式到这里 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f7fb; font-family: 'Inter', sans-serif; color: #1e293b; }
        .app-layout { display: flex; min-height: 100vh; }
        .nav-sidebar { width: 280px; background: #ffffff; border-right: 1px solid #e2e8f0; padding: 2rem 1rem; }
        /* ... 其他样式与之前完全相同，请复制最终版全部样式 ... */
        /* 由于篇幅，此处仅保留关键样式，您替换为完整样式即可 */
        .auth-bar { position: fixed; bottom: 20px; left: 20px; background: rgba(255,255,255,0.9); border-radius: 40px; padding: 0.3rem 1rem; font-size: 0.75rem; display: flex; gap: 12px; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: flex; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>
<div id="app">
    <div v-if="loading" class="loading"><i class="fas fa-spinner fa-pulse"></i> 同步中...</div>
    <div class="app-layout">
        <!-- 左侧导航栏内容（与最终版相同，需保留） -->
        <div class="nav-sidebar">...</div>
        <div class="main-content">...</div>
    </div>
    <div class="auth-bar">
        <i class="fas fa-cloud-upload-alt"></i>
        <span v-if="user">已登录：{{ user.email }}</span>
        <span v-else>未登录</span>
        <button @click="login" v-if="!user">登录/注册</button>
        <button @click="logout" v-else>退出</button>
    </div>
    <!-- 登录模态框 -->
    <div class="modal-mask" v-if="showLoginModal" @click.self="showLoginModal=false">
        <div class="modal-container">
            <div class="modal-header">登录 / 注册</div>
            <div class="modal-body">
                <label>邮箱</label>
                <input type="email" v-model="loginEmail" placeholder="your@email.com">
                <label>密码</label>
                <input type="password" v-model="loginPassword" placeholder="密码（至少6位）">
                <div class="error" v-if="authError">{{ authError }}</div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal" @click="showLoginModal=false">取消</button>
                <button class="btn-modal btn-modal-primary" @click="signIn">登录</button>
                <button class="btn-modal" @click="signUp">注册</button>
            </div>
        </div>
    </div>
</div>
<script>
    // ========== 请替换为您的 Supabase 凭证 ==========
    const SUPABASE_URL = 'https://cpchurgigsjzifqyzove.supabase.co/rest/v1/';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwY2h1cmdpZ3NqemlmcXl6b3ZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MTIwOTMsImV4cCI6MjA5NzA4ODA5M30.2Ft7sE_1j5IUidKRJ6tqhNIH9Ath98F3oIEqSs3XdaU';
    // ===============================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    createApp({
        setup() {
            const loading = ref(false);
            const user = ref(null);
            const showLoginModal = ref(false);
            const loginEmail = ref('');
            const loginPassword = ref('');
            const authError = ref('');

            // 本地 Vue 状态（用于渲染），从云端拉取后同步
            const categories = ref([]);
            const notebooks = ref([]);
            const selectedCategoryId = ref(null);
            const selectedNotebookId = ref(null);
            const activeModule = ref('note');
            // ... 其他状态与之前相同（省略，需要完整迁移）

            // 辅助函数
            async function syncAllData() {
                if (!user.value) return;
                loading.value = true;
                try {
                    // 拉取分类
                    const { data: cats, error: catErr } = await supabase
                        .from('categories')
                        .select('*')
                        .order('created_at', { ascending: true });
                    if (catErr) throw catErr;
                    categories.value = cats || [];

                    // 拉取链接
                    const { data: links, error: linkErr } = await supabase
                        .from('links')
                        .select('*');
                    if (linkErr) throw linkErr;
                    // 将链接挂载到对应分类下
                    categories.value.forEach(c => c.links = links.filter(l => l.category_id === c.id));

                    // 拉取笔记本
                    const { data: nbs, error: nbErr } = await supabase
                        .from('notebooks')
                        .select('*')
                        .order('created_at');
                    if (nbErr) throw nbErr;
                    notebooks.value = nbs || [];

                    // 拉取笔记
                    const { data: notes, error: noteErr } = await supabase
                        .from('notes')
                        .select('*')
                        .order('updated_at', { ascending: false });
                    if (noteErr) throw noteErr;
                    notebooks.value.forEach(nb => nb.notes = notes.filter(n => n.notebook_id === nb.id));
                } catch (e) {
                    console.error(e);
                    alert('同步失败：' + e.message);
                } finally {
                    loading.value = false;
                }
            }

            // 监听数据变化（实时订阅）
            function subscribeToChanges() {
                if (!user.value) return;
                const myId = user.value.id;
                supabase
                    .channel('public:categories')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'categories', filter: `user_id=eq.${myId}` }, () => syncAllData())
                    .subscribe();
                supabase
                    .channel('public:links')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'links', filter: `user_id=eq.${myId}` }, () => syncAllData())
                    .subscribe();
                supabase
                    .channel('public:notebooks')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'notebooks', filter: `user_id=eq.${myId}` }, () => syncAllData())
                    .subscribe();
                supabase
                    .channel('public:notes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'notes', filter: `user_id=eq.${myId}` }, () => syncAllData())
                    .subscribe();
            }

            // 登录/注册
            async function signIn() {
                try {
                    const { error } = await supabase.auth.signInWithPassword({
                        email: loginEmail.value,
                        password: loginPassword.value,
                    });
                    if (error) throw error;
                    showLoginModal.value = false;
                } catch (e) {
                    authError.value = e.message;
                }
            }
            async function signUp() {
                try {
                    const { error } = await supabase.auth.signUp({
                        email: loginEmail.value,
                        password: loginPassword.value,
                    });
                    if (error) throw error;
                    alert('注册成功，请登录邮箱验证（若需要）或直接登录');
                    showLoginModal.value = false;
                } catch (e) {
                    authError.value = e.message;
                }
            }
            async function logout() {
                await supabase.auth.signOut();
                user.value = null;
                categories.value = [];
                notebooks.value = [];
            }

            // 自动恢复登录状态
            supabase.auth.onAuthStateChange(async (event, session) => {
                if (session?.user) {
                    user.value = session.user;
                    await syncAllData();
                    subscribeToChanges();
                } else {
                    user.value = null;
                }
            });

            // 检查当前会话
            async function initAuth() {
                const { data: { session } } = await supabase.auth.getSession();
                if (session?.user) {
                    user.value = session.user;
                    await syncAllData();
                    subscribeToChanges();
                }
            }
            onMounted(initAuth);

            // 封装增删改查函数（分类、链接、笔记本、笔记），调用 Supabase API 并实时更新本地
            // 此处因篇幅仅给出示例，实际需要完整实现所有 mutation
            async function addCategory(name) {
                if (!user.value) return;
                const newId = Date.now();
                const { error } = await supabase.from('categories').insert({
                    id: newId,
                    name,
                    user_id: user.value.id
                });
                if (!error) syncAllData();
            }
            // ... 其他 mutation 类似

            return {
                loading, user, showLoginModal, loginEmail, loginPassword, authError,
                signIn, signUp, logout, categories, notebooks, selectedCategoryId, selectedNotebookId, activeModule,
                // 暴露所有需要的方法和状态（与之前完整版一致）
            };
        }
    }).mount('#app');
</script>
</body>
</html>
